# Steps for uploading artifacts

.rsync_upload:
    image: "fedora:42"
    stage: upload
    tags:
        - docker
        - linux-x86_64
        - build

    script:
        - ls build/
        - dnf install -y --setopt=install_weak_deps=False rsync openssh-clients
        - chmod 400 $RSYNC_KEY_PATH
        - ssh-keygen -y -f $RSYNC_KEY_PATH > $RSYNC_KEY_PATH.pub
        - rsync -tv $RSYNC_DELETE_ARG --recursive -e "ssh -i $RSYNC_KEY_PATH -o StrictHostKeyChecking=no" $RSYNC_SOURCE kitware@web.kitware.com:$RSYNC_DESTINATION/

.rsync_upload_docs:
    extends: .rsync_upload
    environment:
        name: rsync-upload-docs
    variables:
        RSYNC_KEY_PATH: $RSYNC_DOCS_KEY
        RSYNC_DELETE_ARG: --delete

    interruptible: false

.rsync_upload_versioned_docs:
    extends: .rsync_upload
    environment:
        name: rsync-upload-versioned-docs
    before_script:
        - dnf install -y --setopt=install_weak_deps=False python3 openssh-clients
        - chmod 400 $RSYNC_KEY_PATH
        - ssh-keygen -y -f $RSYNC_KEY_PATH > $RSYNC_KEY_PATH.pub
        - .gitlab/ci/prepare-docs-upload-env.sh "$RSYNC_KEY_PATH"
        # Compute the major.minor version from the tag.
        - 'version="$( echo "$CI_COMMIT_TAG" | sed -e "s/^v//" | cut -d. -f1,2 )"'
        - 'export RSYNC_DESTINATION="VTKDoxygen/release/${version}/html"'
        # Create the parent directory structure on the remote server
        - 'ssh -i $RSYNC_KEY_PATH -o StrictHostKeyChecking=no kitware@web.kitware.com "mkdir -p /home/kitware/filepush/VTKDoxygen/release/${version}"'
    after_script:
        - chmod 400 $RSYNC_KEY_PATH
        - ssh-keygen -y -f $RSYNC_KEY_PATH > $RSYNC_KEY_PATH.pub
        - .gitlab/ci/prepare-docs-upload-env.sh "$RSYNC_KEY_PATH"
        - 'version="$( echo "$CI_COMMIT_TAG" | sed -e "s/^v//" | cut -d. -f1,2 )"'
        - .gitlab/ci/update_doc_versions.sh "${version}"
    variables:
        RSYNC_KEY_PATH: $RSYNC_DOCS_KEY
        RSYNC_DELETE_ARG: --delete

    interruptible: false

.rsync_upload_release_artifacts:
    extends: .rsync_upload
    environment:
        name: rsync-upload-release-artifacts
    before_script:
        # Generate the artifact inventory before adding the wheels[+sdk] to the release dir since
        # we do not want to include them in it.
        - dnf install -y --setopt=install_weak_deps=False python3
        - .gitlab/ci/generate-artifacts-inventory.py --artifacts-dir "${RSYNC_SOURCE}" --output-file "${RSYNC_SOURCE}/${CI_COMMIT_TAG}-artifacts.json"
        - . .gitlab/ci/prepare-release-env.sh
    variables:
        RSYNC_KEY_PATH: $RSYNC_RELEASE_KEY

## Uploads a wheel config's built wheel to PyPI. Tag (release) pipelines only.
.pypi_upload:
    image: "fedora:42"
    stage: upload
    tags:
        - docker
        - linux-x86_64
        - build
    environment:
        name: pypi-upload

    script:
        - cd build/
        - ls dist
        - dnf install -y --setopt=install_weak_deps=False pipx
        - pipx ensurepath
        - source $HOME/.bash_profile
        - pipx install twine==6.1.0
        - twine upload --verbose -u __token__ -p $PYPI_UPLOAD_TOKEN dist/*

## Uploads a wheel config's built wheel to the GitLab package registry, plus
## the wheel-sdk tarball and vtk-sdk wheel to vtk.org (both via rsync).
## Weekly-upload schedule pipelines only.
## Set VTK_CI_WHEEL_SDK_TARBALL: "false" for configs that do not produce a
## wheel-sdk tarball (currently the macOS arm64 configs).
.wheel_upload:
    image: "fedora:42"
    stage: upload
    tags:
        - docker
        - linux-x86_64
        - build
    environment:
        name: rsync-upload-wheel-sdk
    variables:
        RSYNC_KEY_PATH: $RSYNC_WHEEL_SDK_KEY
        VTK_CI_WHEEL_SDK_TARBALL: "true"

    script:
        - cd build/
        - ls dist
        - dnf install -y --setopt=install_weak_deps=False pipx rsync openssh-clients
        - pipx ensurepath
        - source $HOME/.bash_profile
        - pipx install twine==6.1.0
        - twine upload --verbose -u gitlab-ci-token -p $CI_JOB_TOKEN --repository-url https://gitlab.kitware.com/api/v4/projects/$CI_PROJECT_ID/packages/pypi dist/*
        - cd ..
        - chmod 400 $RSYNC_KEY_PATH
        - ssh-keygen -y -f $RSYNC_KEY_PATH > $RSYNC_KEY_PATH.pub
        - '[ "$VTK_CI_WHEEL_SDK_TARBALL" != "false" ] && rsync -tv --recursive -e "ssh -i $RSYNC_KEY_PATH -o StrictHostKeyChecking=no" build/*-wheel-sdk-*.tar.xz kitware@web.kitware.com:wheel-sdks/'
        # The wheel location is the name of the PIP package. It is important that the last component is the same as the package name.
        # as `pip install vtk-sdk --extra-index-url "vtk.org/files/wheel-sdks"` will look into `vtk.org/files/wheel-sdks/vtk-sdk`.
        - rsync -tv --recursive -e "ssh -i $RSYNC_KEY_PATH -o StrictHostKeyChecking=no" build/wheel_sdks/*.whl kitware@web.kitware.com:wheel-sdks/vtk-sdk/

.generic_vtk_wasm_emscripten_linux_upload:
    stage: upload
    tags:
        - docker
        - linux-x86_64
        - build

    script:
        - .gitlab/ci/upload_webassembly_archive.sh $WASM_ARCHITECTURE

    interruptible: true
